name: Build Artifacts
permissions:
  contents: read
  packages: write
  actions: read
on:
  release:
    types: [created]
  push:
    branches:
      - '**'
    paths-ignore:
      - 'docs/**'
      - 'CODE-OF-CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'README.md'
      - 'SECURITY.md'
  pull_request:
    branches: [main]
    types:
      [opened, reopened, synchronize]
    paths-ignore:
      - 'docs/**'
      - 'CODE-OF-CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - 'README.md'
      - 'SECURITY.md'

env:
  TAG_NAME: ${{ github.event.release.tag_name || github.ref }}

concurrency:
  # On main/release, we don't want any jobs cancelled so the sha is used to name the group
  # On PR branches, we cancel the job if new commits are pushed
  # More info: https://stackoverflow.com/a/68422069/253468
  group: ${{ github.ref == 'refs/heads/main' && format('ci-main-{0}', github.sha) || format('ci-main-{0}', github.ref) }}
  cancel-in-progress: true

jobs:

  helm-charts-build:
    runs-on: ubuntu-latest
    outputs:
      istio-minor-version: ${{ steps.version.outputs.istio-minor-version }}
      istio-version: ${{ steps.version.outputs.istio-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read Istio version from Chart.yaml
        id: version
        run: |
          ISTIO_VERSION="$(yq e '.dependencies[0].version' helm-templates/qubership-istio/Chart.yaml)"
          echo "istio-version=${ISTIO_VERSION}" >> "$GITHUB_OUTPUT"
          echo "istio-minor-version=${ISTIO_VERSION%.*}" >> "$GITHUB_OUTPUT"

      - name: Install Helm 4
        uses: azure/setup-helm@v5
        with:
          version: v4.0.1

      - name: Build qubership-istio chart dependencies
        run: helm dependency build helm-templates/qubership-istio

      - name: Extract images from rendered Helm templates
        run: |
          helm template istio helm-templates/qubership-istio > /tmp/rendered.yaml

          # Extract images from known workload resources by exact kind/name/path using yq.
          # Each document is selected by kind+metadata.name; image is at a deterministic path.
          CNI_IMAGE=$(yq e 'select(.kind == "DaemonSet" and .metadata.name == "istio-cni-node")
            | .spec.template.spec.containers[0].image' /tmp/rendered.yaml)

          ISTIOD_IMAGE=$(yq e 'select(.kind == "Deployment" and .metadata.name == "istiod")
            | .spec.template.spec.containers[0].image' /tmp/rendered.yaml)

          ZTUNNEL_IMAGE=$(yq e 'select(.kind == "DaemonSet" and .metadata.name == "ztunnel")
            | .spec.template.spec.containers[0].image' /tmp/rendered.yaml)

          cat > ./helm-templates/qubership-istio/effective-images.yaml <<EOF
          install_cni_image: ${CNI_IMAGE}
          pilot_image: ${ISTIOD_IMAGE}
          ztunnel_image: ${ZTUNNEL_IMAGE}
          EOF

      - name: Inject tweak templates into subchart packages
        run: |
          bash tweak/tweak.sh

      - name: Upload helm-templates artifact
        uses: actions/upload-artifact@v7
        with:
          name: helm-templates
          path: ./helm-templates/qubership-istio

  integration-test:
    needs: [ helm-charts-build ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download helm-templates artifact
        uses: actions/download-artifact@v8
        with:
          name: helm-templates
          path: ./helm-templates/qubership-istio

      - name: Build transfer image locally (linux/amd64)
        run: |
          docker build \
            --platform linux/amd64 \
            -t qubership-istio-transfer:test \
            -f Dockerfile .

      # The transfer image is FROM scratch — no shell, so we use docker create + docker cp
      - name: Extract helm-templates from transfer image
        run: |
          CID=$(docker create --entrypoint="" qubership-istio-transfer:test /bin/sh)
          docker cp ${CID}:/helm-templates ./helm-templates-extracted
          docker rm ${CID}

      - name: Install Helm 4
        uses: azure/setup-helm@v5
        with:
          version: v4.0.1

      - name: Setup Python (required for ct)
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
    
      - name: Install chart-testing
        uses: helm/chart-testing-action@v2
    
      # Lint chart (includes schema validation)
      - name: Run ct lint
        run: ct lint --all --chart-dirs ./helm-templates-extracted/qubership-istio
      
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: istio-test

      - name: Helm install qubership-istio
        run: |
          helm upgrade --install qubership-istio ./helm-templates-extracted/qubership-istio \
            --namespace istio-system \
            --create-namespace \
            --timeout 3m \
            --wait \
            --force-conflicts

      - name: Verify rollout
        run: |
          echo "::group::istiod deployment"
          kubectl rollout status deployment/istiod -n istio-system --timeout=120s
          kubectl get deployment istiod -n istio-system -o wide
          echo "::endgroup::"

          echo "::group::istio-cni-node daemonset"
          kubectl rollout status daemonset/istio-cni-node -n istio-system --timeout=120s
          kubectl get daemonset istio-cni-node -n istio-system -o wide
          echo "::endgroup::"

          echo "::group::ztunnel daemonset"
          kubectl rollout status daemonset/ztunnel -n istio-system --timeout=120s
          kubectl get daemonset ztunnel -n istio-system -o wide
          echo "::endgroup::"

          echo "::group::all pods"
          kubectl get pods -n istio-system -o wide
          echo "::endgroup::"

      - name: Dump state on failure
        if: failure()
        run: |
          mkdir -p /tmp/istio-debug
          kubectl get all -n istio-system                                 > /tmp/istio-debug/resources.txt      2>&1
          kubectl describe pods -n istio-system                           > /tmp/istio-debug/pods-describe.txt  2>&1
          kubectl get events -n istio-system --sort-by='.lastTimestamp'   > /tmp/istio-debug/events.txt         2>&1
          kubectl logs -n istio-system -l app=istiod --tail=200           > /tmp/istio-debug/istiod-logs.txt    2>&1 || true
          kubectl logs -n istio-system -l k8s-app=istio-cni-node --tail=200 > /tmp/istio-debug/cni-logs.txt    2>&1 || true
          kubectl logs -n istio-system -l app=ztunnel --tail=200          > /tmp/istio-debug/ztunnel-logs.txt   2>&1 || true

      - name: Upload debug bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: istio-debug-${{ github.run_id }}
          path: /tmp/istio-debug/
          retention-days: 7

  multiplatform_build:
    needs: [ helm-charts-build, integration-test ]
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Tag
        run: echo "TAG_NAME=$(echo ${TAG_NAME} | sed 's@refs/tags/@@;s@refs/heads/@@;s@/@_@g')" >> $GITHUB_ENV
      - name: Build and push
        uses: netcracker/qubership-workflow-hub/actions/docker-action@main
        with:
          component: |
            [{
              "name": "qubership-istio-transfer", 
              "dockerfile": "./Dockerfile",
              "build_context": "."
            }]
          checkout: true
          download-artifact: true
          download-artifact-name: helm-templates
          download-artifact-path: ./helm-templates/qubership-istio/
          download-artifact-merge-multiple: true
          platforms: linux/amd64,linux/arm64
          tags: "${{ needs.helm-charts-build.outputs.istio-minor-version }}-${{ env.TAG_NAME }},${{ needs.helm-charts-build.outputs.istio-minor-version }}-latest,${{ needs.helm-charts-build.outputs.istio-version }}"
          registry: ghcr.io
          dry-run: ${{ github.event.pull_request.user.login == 'renovate[bot]' }} 
        env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

